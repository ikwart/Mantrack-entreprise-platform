name: 'mantrac_dw'
version: '1.0.0'
config-version: 2

profile: 'mantrac_dw'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  mantrac_dw:
    staging:
      +materialized: view
      +schema: staging
      +persist_docs:
        relation: true
        columns: true
    intermediate:
      +materialized: view
      +schema: intermediate
      +persist_docs:
        relation: true
        columns: true
    marts:
      +materialized: table
      +schema: marts
      +persist_docs:
        relation: true
        columns: true
      +grants:
        select: ['mantrac_analyst']
