version: "3.8"

# ============================================================================
# Mantrac Ghana Data Platform - Local Development Stack
# ----------------------------------------------------------------------------
# Services:
#   postgres-dw        Warehouse database (schema.sql + seed_data)
#   postgres-airflow    Airflow metadata database (kept separate from the
#                        warehouse on purpose - keeps orchestration state
#                        cleanly isolated from business data)
#   zookeeper / kafka    Telemetry event streaming
#   spark-master/worker  Batch + streaming processing
#   airflow-init         One-shot: creates Airflow DB schema + admin user
#   airflow-webserver     Airflow UI (http://localhost:8080)
#   airflow-scheduler     Airflow scheduler (runs the DAG)
#
# Quick start:
#   1. cp .env.example .env
#   2. docker-compose up airflow-init          (run once)
#   3. docker-compose up -d                    (start everything)
#   4. psql or any client -> localhost:5433 to load sql/schema.sql + seed data
#   5. Airflow UI at localhost:8080 (user/pass from .env)
# ============================================================================

x-airflow-common: &airflow-common
  build: ./airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: "Africa/Accra"
    # Registers a Spark connection named 'spark_default' automatically -
    # no manual setup needed in the Airflow UI. Points at the spark-master
    # service on the docker-compose network.
    AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077?deploy_mode=client
    # Warehouse DB connection, used by the pipeline/*.py scripts if/when
    # they're switched from CSV to reading directly from Postgres.
    AIRFLOW_CONN_MANTRAC_DW: postgresql://${DW_DB_USER}:${DW_DB_PASSWORD}@postgres-dw:5432/${DW_DB_NAME}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark/jobs:/opt/spark_jobs
    - ./pipeline:/opt/pipeline
    - ./sql:/opt/sql
    - ./kafka:/opt/kafka_scripts
    - ./kafka/data:/opt/kafka_data
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:

  # --------------------------------------------------------------------------
  # Warehouse database
  # --------------------------------------------------------------------------
  postgres-dw:
    image: postgres:16
    container_name: mantrac-postgres-dw
    environment:
      POSTGRES_USER: ${DW_DB_USER}
      POSTGRES_PASSWORD: ${DW_DB_PASSWORD}
      POSTGRES_DB: ${DW_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - dw-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d/sql   # visible for manual loading via docker exec
      - ./kafka/data:/docker-entrypoint-initdb.d/kafka_data   # for load_fault_events.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DW_DB_USER} -d ${DW_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Airflow metadata database (kept separate from the warehouse)
  # --------------------------------------------------------------------------
  postgres-airflow:
    image: postgres:16
    container_name: mantrac-postgres-airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Kafka (telemetry event stream)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: mantrac-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: mantrac-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx400m -Xms400m"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # --------------------------------------------------------------------------
  # Spark (batch scoring + streaming telemetry aggregation)
  # --------------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5
    container_name: mantrac-spark-master
    environment:
      SPARK_MODE: master
    ports:
      - "8081:8080"   # Spark master UI
      - "7077:7077"
    volumes:
      - ./spark/jobs:/opt/spark_jobs
      - ./sql:/opt/sql
      - ./kafka/data:/opt/kafka_data
      - spark-checkpoints:/opt/spark_checkpoints

  spark-worker:
    image: bitnami/spark:3.5
    container_name: mantrac-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
    depends_on:
      - spark-master
    volumes:
      - ./spark/jobs:/opt/spark_jobs
      - ./sql:/opt/sql
      - ./kafka/data:/opt/kafka_data
      - spark-checkpoints:/opt/spark_checkpoints

  # --------------------------------------------------------------------------
  # Airflow
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: mantrac-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Kay \
          --lastname Admin \
          --role Admin \
          --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    container_name: mantrac-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: mantrac-airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  dw-data:
  airflow-db-data:
  spark-checkpoints:
